name: Sprint Master Test Cases

on:
  pull_request:
    branches:
      - Go_Sprint_Master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################
      # SETUP GO
      #########################################

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      #########################################
      # RUN GO TEST FILE
      #########################################

      - name: Run Go Test File
        run: |
          echo "Running Go Test Cases..."
          go run handler_test.go

      #########################################
      # GENERATE REPORT
      #########################################

      - name: Generate Test Report
        if: always()
        run: |
          echo "GitHub CI Execution Report" > test-report.txt
          echo "Repository: ${{ github.repository }}" >> test-report.txt
          echo "Branch: ${{ github.ref_name }}" >> test-report.txt
          echo "Triggered By: ${{ github.actor }}" >> test-report.txt
          echo "Result: ${{ job.status }}" >> test-report.txt

      #########################################
      # UPLOAD REPORT
      #########################################

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt

      #########################################
      # SEND EMAIL
      #########################################

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: CI Result - ${{ job.status }}
          to: aaaare653tp6pq45oyh6pxpykm@spantech.slack.com
          from: GitHub CI
          body: |
            GitHub CI Execution Report

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Test Result: ${{ job.status }}

            Run Link:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      #########################################
      # CLOSE PR IF TEST FAILED
      #########################################

      - name: Close Pull Request if Tests Fail
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: "closed"
            });
